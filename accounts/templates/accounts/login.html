{% extends 'base.html' %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-5 shadow-lg" style="width: 400px; border-radius: 20px;">

        <h2 class="text-center mb-3">Welcome Back</h2>
        <p class="text-center text-muted">Your tactile interface</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <select name="role" class="form-control mb-3">
                <option value="citizen">Citizen</option>
                <option value="worker">Worker</option>
                <option value="admin">Admin</option>
            </select>

            <input class="form-control mb-3" type="text" name="username" placeholder="Username">

            <input class="form-control mb-3" type="password" name="password" placeholder="Password">

            <button class="btn btn-dark w-100">Enter the Atmosphere</button>
        </form>

        <p class="text-center mt-3">
            Don't have an account?
            <a href="/accounts/register/">Register here</a>
        </p>

    </div>
</div>

{% endblock %}
